name: Frontend Main CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/frontend-main-ci.yml
      - .github/workflows/frontend-pr-ci.yml
      - src/frontend/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend application
        run: bun run build

      - name: Run frontend tests with coverage
        run: |
          set -euo pipefail
          mkdir -p ../../TestResults/frontend
          rm -rf coverage
          CI=true FORCE_COLOR=0 bun run test --watch=false --coverage 2>&1 | tee ../../TestResults/frontend/test-output.log
          # Strip ANSI escape codes so downstream parsing is deterministic.
          sed -E 's/\x1B\[[0-9;]*[mK]//g' ../../TestResults/frontend/test-output.log > ../../TestResults/frontend/test-output.clean.log

      - name: Generate frontend badge data
        working-directory: .
        run: |
          set -euo pipefail

          mkdir -p .github/badges

          test_log='TestResults/frontend/test-output.clean.log'
          if [ ! -f "${test_log}" ]; then
            test_log='TestResults/frontend/test-output.log'
          fi

          tests_line=$(grep -E 'Tests[[:space:]]+[0-9]+[[:space:]]+passed[[:space:]]+\([0-9]+\)' "${test_log}" | tail -1 || true)
          files_line=$(grep -E 'Test Files[[:space:]]+[0-9]+[[:space:]]+passed[[:space:]]+\([0-9]+\)' "${test_log}" | tail -1 || true)

          tests_passed=$(printf '%s\n' "${tests_line}" | sed -n 's/.*Tests[[:space:]]\+\([0-9][0-9]*\)[[:space:]]\+passed[[:space:]]\+(\([0-9][0-9]*\)).*/\1/p')
          tests_total=$(printf '%s\n' "${tests_line}" | sed -n 's/.*Tests[[:space:]]\+[0-9][0-9]*[[:space:]]\+passed[[:space:]]\+(\([0-9][0-9]*\)).*/\1/p')
          test_files_total=$(printf '%s\n' "${files_line}" | sed -n 's/.*Test Files[[:space:]]\+[0-9][0-9]*[[:space:]]\+passed[[:space:]]\+(\([0-9][0-9]*\)).*/\1/p')

          tests_passed=${tests_passed:-0}
          tests_total=${tests_total:-0}
          test_files_total=${test_files_total:-0}

          if [ "${test_files_total}" -gt 0 ] && [ "${tests_total}" -eq 0 ]; then
            echo "Failed to parse tests summary from ${test_log} despite test files running."
            echo "Last detected tests line: ${tests_line:-<none>}"
            echo "Last detected test-files line: ${files_line:-<none>}"
            exit 1
          fi

          tests_color='red'
          if [ "${tests_total}" -eq 0 ]; then
            tests_color='lightgrey'
          elif [ "${tests_passed}" -eq "${tests_total}" ]; then
            tests_color='brightgreen'
          elif [ "${tests_passed}" -gt 0 ]; then
            tests_color='yellow'
          fi

          tests_message="${tests_passed}/${tests_total} passed"

          coverage_file='src/frontend/coverage/INVENTORY/clover.xml'
          coverage_pct='0.0'

          if [ ! -f "${coverage_file}" ]; then
            echo "Expected coverage report not found: ${coverage_file}"
            exit 1
          fi

          metrics_line=$(grep -m1 '<metrics ' "${coverage_file}" || true)
          statements=$(printf '%s\n' "${metrics_line}" | sed -n 's/.*statements="\([0-9][0-9]*\)".*/\1/p')
          covered=$(printf '%s\n' "${metrics_line}" | sed -n 's/.*coveredstatements="\([0-9][0-9]*\)".*/\1/p')
          statements=${statements:-0}
          covered=${covered:-0}

          if [ "${statements}" -gt 0 ]; then
            coverage_pct=$(awk -v c="${covered}" -v s="${statements}" 'BEGIN { printf "%.1f", (c/s)*100 }')
          else
            echo "Coverage metrics are invalid in ${coverage_file} (statements=${statements}, covered=${covered})."
            exit 1
          fi

          echo "Frontend CI parse summary: tests=${tests_message}, test_files_total=${test_files_total}, coverage_file=${coverage_file}, coverage=${coverage_pct}%"

          coverage_color='red'
          if awk -v p="${coverage_pct}" 'BEGIN { exit !(p >= 80) }'; then
            coverage_color='brightgreen'
          elif awk -v p="${coverage_pct}" 'BEGIN { exit !(p >= 60) }'; then
            coverage_color='yellow'
          elif awk -v p="${coverage_pct}" 'BEGIN { exit !(p > 0) }'; then
            coverage_color='orange'
          else
            coverage_color='lightgrey'
          fi

          cat > .github/badges/frontend-tests.json <<JSON
          {
            "schemaVersion": 1,
            "label": "frontend tests",
            "message": "${tests_message}",
            "color": "${tests_color}"
          }
          JSON

          cat > .github/badges/frontend-coverage.json <<JSON
          {
            "schemaVersion": 1,
            "label": "frontend coverage",
            "message": "${coverage_pct}%",
            "color": "${coverage_color}"
          }
          JSON

          make_badge_svg() {
            local label="$1"
            local message="$2"
            local color="$3"
            local output="$4"

            local label_chars=${#label}
            local message_chars=${#message}
            local label_width=$((label_chars * 7 + 14))
            local message_width=$((message_chars * 7 + 14))
            local total_width=$((label_width + message_width))
            local label_center=$((label_width / 2))
            local message_center=$((label_width + (message_width / 2)))

            {
              printf '%s\n' "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"${total_width}\" height=\"20\" role=\"img\" aria-label=\"${label}: ${message}\">"
              printf '%s\n' '  <linearGradient id="s" x2="0" y2="100%">'
              printf '%s\n' '    <stop offset="0" stop-color="#fff" stop-opacity=".7"/>'
              printf '%s\n' '    <stop offset=".1" stop-color="#aaa" stop-opacity=".1"/>'
              printf '%s\n' '    <stop offset=".9" stop-color="#000" stop-opacity=".3"/>'
              printf '%s\n' '    <stop offset="1" stop-color="#000" stop-opacity=".5"/>'
              printf '%s\n' '  </linearGradient>'
              printf '%s\n' '  <clipPath id="r">'
              printf '%s\n' "    <rect width=\"${total_width}\" height=\"20\" rx=\"3\" fill=\"#fff\"/>"
              printf '%s\n' '  </clipPath>'
              printf '%s\n' '  <g clip-path="url(#r)">'
              printf '%s\n' "    <rect width=\"${label_width}\" height=\"20\" fill=\"#555\"/>"
              printf '%s\n' "    <rect x=\"${label_width}\" width=\"${message_width}\" height=\"20\" fill=\"${color}\"/>"
              printf '%s\n' "    <rect width=\"${total_width}\" height=\"20\" fill=\"url(#s)\"/>"
              printf '%s\n' '  </g>'
              printf '%s\n' '  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">'
              printf '%s\n' "    <text x=\"${label_center}\" y=\"15\" fill=\"#010101\" fill-opacity=\".3\">${label}</text>"
              printf '%s\n' "    <text x=\"${label_center}\" y=\"14\">${label}</text>"
              printf '%s\n' "    <text x=\"${message_center}\" y=\"15\" fill=\"#010101\" fill-opacity=\".3\">${message}</text>"
              printf '%s\n' "    <text x=\"${message_center}\" y=\"14\">${message}</text>"
              printf '%s\n' '  </g>'
              printf '%s\n' '</svg>'
            } > "${output}"
          }

          to_hex_color() {
            case "$1" in
              brightgreen) echo '#4c1' ;;
              green) echo '#97ca00' ;;
              yellow) echo '#dfb317' ;;
              orange) echo '#fe7d37' ;;
              red) echo '#e05d44' ;;
              lightgrey) echo '#9f9f9f' ;;
              *) echo '#9f9f9f' ;;
            esac
          }

          make_badge_svg 'frontend tests' "${tests_message}" "$(to_hex_color "${tests_color}")" '.github/badges/frontend-tests.svg'
          make_badge_svg 'frontend coverage' "${coverage_pct}%" "$(to_hex_color "${coverage_color}")" '.github/badges/frontend-coverage.svg'

          rows_file=.github/badges/frontend-tests-table.md
          {
            echo '| Project | Tests | Coverage |'
            echo '|---|---|---:|'
            printf '| INVENTORY | %s | %s%% |\n' "${tests_message}" "${coverage_pct}"
          } > "${rows_file}"

          awk -v table_file="${rows_file}" '
            $0=="<!-- FRONTEND_TEST_BREAKDOWN_START -->" {
              print;
              while ((getline line < table_file) > 0) print line;
              close(table_file);
              in_block=1;
              next;
            }
            $0=="<!-- FRONTEND_TEST_BREAKDOWN_END -->" {
              in_block=0;
              print;
              next;
            }
            !in_block { print; }
          ' README.md > README.md.tmp

          mv README.md.tmp README.md

      - name: Commit frontend badge updates
        working-directory: .
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- .github/badges/frontend-tests.json .github/badges/frontend-coverage.json .github/badges/frontend-tests.svg .github/badges/frontend-coverage.svg README.md)" ]; then
            echo 'No frontend badge changes to commit.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/badges/frontend-tests.json .github/badges/frontend-coverage.json .github/badges/frontend-tests.svg .github/badges/frontend-coverage.svg README.md
          git commit -m 'ci: update frontend test and coverage badges'
          git push