name: Frontend PR CI

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/frontend-main-ci.yml
      - .github/workflows/frontend-pr-ci.yml
      - src/frontend/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend application
        run: bun run build

      - name: Run frontend tests with coverage
        run: |
          set -euo pipefail
          mkdir -p ../../TestResults/frontend
          rm -rf coverage
          CI=true FORCE_COLOR=0 bun run test --watch=false --coverage 2>&1 | tee ../../TestResults/frontend/test-output.log
          # Strip ANSI escape codes so parsing is deterministic across environments.
          sed -E 's/\x1B\[[0-9;]*[mK]//g' ../../TestResults/frontend/test-output.log > ../../TestResults/frontend/test-output.clean.log

      - name: Validate frontend test and coverage parsing
        working-directory: .
        run: |
          set -euo pipefail

          test_log='TestResults/frontend/test-output.clean.log'
          if [ ! -f "${test_log}" ]; then
            test_log='TestResults/frontend/test-output.log'
          fi

          tests_line=$(grep -E 'Tests[[:space:]]+[0-9]+[[:space:]]+passed[[:space:]]+\([0-9]+\)' "${test_log}" | tail -1 || true)
          files_line=$(grep -E 'Test Files[[:space:]]+[0-9]+[[:space:]]+passed[[:space:]]+\([0-9]+\)' "${test_log}" | tail -1 || true)

          tests_total=$(printf '%s\n' "${tests_line}" | sed -n 's/.*Tests[[:space:]]\+[0-9][0-9]*[[:space:]]\+passed[[:space:]]\+(\([0-9][0-9]*\)).*/\1/p')
          test_files_total=$(printf '%s\n' "${files_line}" | sed -n 's/.*Test Files[[:space:]]\+[0-9][0-9]*[[:space:]]\+passed[[:space:]]\+(\([0-9][0-9]*\)).*/\1/p')

          tests_total=${tests_total:-0}
          test_files_total=${test_files_total:-0}

          if [ "${test_files_total}" -gt 0 ] && [ "${tests_total}" -eq 0 ]; then
            echo "Failed to parse tests summary from ${test_log} despite test files running."
            echo "Last detected tests line: ${tests_line:-<none>}"
            echo "Last detected test-files line: ${files_line:-<none>}"
            exit 1
          fi

          coverage_file='src/frontend/coverage/INVENTORY/clover.xml'
          if [ ! -f "${coverage_file}" ]; then
            echo "Expected coverage report not found: ${coverage_file}"
            exit 1
          fi

          metrics_line=$(grep -m1 '<metrics ' "${coverage_file}" || true)
          statements=$(printf '%s\n' "${metrics_line}" | sed -n 's/.*statements="\([0-9][0-9]*\)".*/\1/p')
          covered=$(printf '%s\n' "${metrics_line}" | sed -n 's/.*coveredstatements="\([0-9][0-9]*\)".*/\1/p')
          statements=${statements:-0}
          covered=${covered:-0}

          if [ "${statements}" -le 0 ]; then
            echo "Coverage metrics are invalid in ${coverage_file} (statements=${statements}, covered=${covered})."
            exit 1
          fi

          coverage_pct=$(awk -v c="${covered}" -v s="${statements}" 'BEGIN { printf "%.1f", (c/s)*100 }')
          echo "Frontend PR validation summary: test_files_total=${test_files_total}, tests_total=${tests_total}, coverage_file=${coverage_file}, coverage=${coverage_pct}%"