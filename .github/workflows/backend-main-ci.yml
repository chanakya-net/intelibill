name: Backend Main CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/backend-main-ci.yml
      - .github/workflows/backend-pr-ci.yml
      - src/backend/**
      - tests/backend/**
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore backend solution
        run: dotnet restore src/backend/InventoryAI.slnx

      - name: Build backend solution
        run: dotnet build src/backend/InventoryAI.slnx --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test src/backend/InventoryAI.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory TestResults --collect:"XPlat Code Coverage"

      - name: Generate badge data
        run: |
          set -euo pipefail

          mkdir -p .github/badges

          trx_files=$(find TestResults -type f -name '*.trx' || true)
          if [ -z "${trx_files}" ]; then
            echo 'No TRX files found under TestResults.'
            exit 1
          fi

          total_tests=$(grep -hPo 'total="\K[0-9]+' ${trx_files} | awk '{s+=$1} END{print s+0}')
          passed_tests=$(grep -hPo 'passed="\K[0-9]+' ${trx_files} | awk '{s+=$1} END{print s+0}')

          tests_color="red"
          if [ "${total_tests}" -eq 0 ]; then
            tests_color="lightgrey"
          elif [ "${passed_tests}" -eq "${total_tests}" ]; then
            tests_color="brightgreen"
          elif [ "${passed_tests}" -gt 0 ]; then
            tests_color="yellow"
          fi

          cat > .github/badges/tests.json <<JSON
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${passed_tests}/${total_tests} passed",
            "color": "${tests_color}"
          }
          JSON

          coverage_files=$(find TestResults -type f -name 'coverage.cobertura.xml' || true)
          if [ -n "${coverage_files}" ]; then
            lines_valid=$(grep -hPo 'lines-valid="\K[0-9]+' ${coverage_files} | awk '{s+=$1} END{print s+0}')
            lines_covered=$(grep -hPo 'lines-covered="\K[0-9]+' ${coverage_files} | awk '{s+=$1} END{print s+0}')
          else
            lines_valid=0
            lines_covered=0
          fi

          if [ "${lines_valid}" -gt 0 ]; then
            coverage_pct=$(awk -v c="${lines_covered}" -v v="${lines_valid}" 'BEGIN { printf "%.1f", (c/v)*100 }')
          else
            coverage_pct="0.0"
          fi

          coverage_color="red"
          if awk -v p="${coverage_pct}" 'BEGIN { exit !(p >= 80) }'; then
            coverage_color="brightgreen"
          elif awk -v p="${coverage_pct}" 'BEGIN { exit !(p >= 60) }'; then
            coverage_color="yellow"
          elif awk -v p="${coverage_pct}" 'BEGIN { exit !(p > 0) }'; then
            coverage_color="orange"
          else
            coverage_color="lightgrey"
          fi

          cat > .github/badges/coverage.json <<JSON
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${coverage_pct}%",
            "color": "${coverage_color}"
          }
          JSON

      - name: Commit badge updates
        run: |
          set -euo pipefail

          if git diff --quiet -- .github/badges/tests.json .github/badges/coverage.json; then
            echo 'No badge changes to commit.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/badges/tests.json .github/badges/coverage.json
          git commit -m 'ci: update test and coverage badges'
          git push
