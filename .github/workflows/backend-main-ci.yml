name: Backend Main CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/backend-main-ci.yml
      - .github/workflows/backend-pr-ci.yml
      - src/backend/**
      - tests/backend/**
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore backend solution
        run: dotnet restore src/backend/Intelibill.slnx

      - name: Build backend solution
        run: dotnet build src/backend/Intelibill.slnx --configuration Release --no-restore

      - name: Run backend tests
        run: |
          set -euo pipefail

          mapfile -t test_projects < <(find tests/backend -type f -name '*.csproj' | sort)
          if [ ${#test_projects[@]} -eq 0 ]; then
            echo 'No backend test projects found under tests/backend.'
            exit 1
          fi

          for project in "${test_projects[@]}"; do
            project_name=$(basename "${project}" .csproj)
            project_results_dir="TestResults/${project_name}"

            dotnet test "${project}" \
              --configuration Debug \
              --verbosity normal \
              --logger "trx;LogFileName=${project_name}.trx" \
              --results-directory "${project_results_dir}"
          done

      - name: Generate badge data
        run: |
          set -euo pipefail

          mkdir -p .github/badges

          mapfile -t test_projects < <(find tests/backend -type f -name '*.csproj' | sort)
          if [ ${#test_projects[@]} -eq 0 ]; then
            echo 'No backend test projects found under tests/backend.'
            exit 1
          fi

          total_tests=0
          passed_tests=0
          failed_tests=0
          skipped_tests=0

          for project in "${test_projects[@]}"; do
            project_name=$(basename "${project}" .csproj)
            trx_file="TestResults/${project_name}/${project_name}.trx"

            if [ ! -f "${trx_file}" ]; then
              echo "Expected TRX file not found for ${project_name}: ${trx_file}"
              exit 1
            fi

            total=$(grep -oP 'Counters[^>]*total="\K[0-9]+' "${trx_file}" | head -1 || true)
            passed=$(grep -oP 'Counters[^>]*passed="\K[0-9]+' "${trx_file}" | head -1 || true)
            failed=$(grep -oP 'Counters[^>]*failed="\K[0-9]+' "${trx_file}" | head -1 || true)
            skipped=$(grep -oP 'Counters[^>]*notExecuted="\K[0-9]+' "${trx_file}" | head -1 || true)

            total=${total:-0}
            passed=${passed:-0}
            failed=${failed:-0}
            skipped=${skipped:-0}

            total_tests=$((total_tests + total))
            passed_tests=$((passed_tests + passed))
            failed_tests=$((failed_tests + failed))
            skipped_tests=$((skipped_tests + skipped))
          done

          tests_color="red"
          if [ "${total_tests}" -eq 0 ]; then
            tests_color="lightgrey"
          elif [ "${passed_tests}" -eq "${total_tests}" ]; then
            tests_color="brightgreen"
          elif [ "${passed_tests}" -gt 0 ]; then
            tests_color="yellow"
          fi

          cat > .github/badges/tests.json <<JSON
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${passed_tests}/${total_tests} passed",
            "color": "${tests_color}"
          }
          JSON

          make_badge_svg() {
            local label="$1"
            local message="$2"
            local color="$3"
            local output="$4"

            local label_chars=${#label}
            local message_chars=${#message}
            local label_width=$((label_chars * 7 + 14))
            local message_width=$((message_chars * 7 + 14))
            local total_width=$((label_width + message_width))
            local label_center=$((label_width / 2))
            local message_center=$((label_width + (message_width / 2)))

            {
              printf '%s\n' "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"${total_width}\" height=\"20\" role=\"img\" aria-label=\"${label}: ${message}\">"
              printf '%s\n' '  <linearGradient id="s" x2="0" y2="100%">'
              printf '%s\n' '    <stop offset="0" stop-color="#fff" stop-opacity=".7"/>'
              printf '%s\n' '    <stop offset=".1" stop-color="#aaa" stop-opacity=".1"/>'
              printf '%s\n' '    <stop offset=".9" stop-color="#000" stop-opacity=".3"/>'
              printf '%s\n' '    <stop offset="1" stop-color="#000" stop-opacity=".5"/>'
              printf '%s\n' '  </linearGradient>'
              printf '%s\n' '  <clipPath id="r">'
              printf '%s\n' "    <rect width=\"${total_width}\" height=\"20\" rx=\"3\" fill=\"#fff\"/>"
              printf '%s\n' '  </clipPath>'
              printf '%s\n' '  <g clip-path="url(#r)">'
              printf '%s\n' "    <rect width=\"${label_width}\" height=\"20\" fill=\"#555\"/>"
              printf '%s\n' "    <rect x=\"${label_width}\" width=\"${message_width}\" height=\"20\" fill=\"${color}\"/>"
              printf '%s\n' "    <rect width=\"${total_width}\" height=\"20\" fill=\"url(#s)\"/>"
              printf '%s\n' '  </g>'
              printf '%s\n' '  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">'
              printf '%s\n' "    <text x=\"${label_center}\" y=\"15\" fill=\"#010101\" fill-opacity=\".3\">${label}</text>"
              printf '%s\n' "    <text x=\"${label_center}\" y=\"14\">${label}</text>"
              printf '%s\n' "    <text x=\"${message_center}\" y=\"15\" fill=\"#010101\" fill-opacity=\".3\">${message}</text>"
              printf '%s\n' "    <text x=\"${message_center}\" y=\"14\">${message}</text>"
              printf '%s\n' '  </g>'
              printf '%s\n' '</svg>'
            } > "${output}"
          }

          to_hex_color() {
            case "$1" in
              brightgreen) echo "#4c1" ;;
              green) echo "#97ca00" ;;
              yellow) echo "#dfb317" ;;
              orange) echo "#fe7d37" ;;
              red) echo "#e05d44" ;;
              lightgrey) echo "#9f9f9f" ;;
              *) echo "#9f9f9f" ;;
            esac
          }

          make_badge_svg "tests" "${passed_tests}/${total_tests} passed" "$(to_hex_color "${tests_color}")" ".github/badges/tests.svg"

      - name: Commit badge updates
        run: |
          set -euo pipefail

          if git diff --quiet -- .github/badges/tests.json .github/badges/tests.svg; then
            echo 'No badge changes to commit.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/badges/tests.json .github/badges/tests.svg
          git commit -m 'ci: update test badges'
          git push
