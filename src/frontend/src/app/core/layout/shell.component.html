<div class="app-shell min-h-screen">
  <header class="sticky top-0 z-30 border-b border-orange-200/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3">
        <div class="grid h-10 w-10 place-content-center rounded-xl bg-orange-700 text-sm font-bold tracking-widest text-orange-50">
          OZ
        </div>
        <div class="relative" #shopMenuRoot>
          <p class="text-xs font-semibold uppercase tracking-[0.22em] text-orange-700/75">Enterprise Suite</p>
          <div class="flex items-center gap-3">
            <h1 class="text-lg font-bold leading-tight text-stone-900">Intelibill</h1>
            <button
              type="button"
              class="active-shop-trigger"
              *ngIf="activeShopLabel() as activeShopCaption"
              [attr.aria-expanded]="isShopMenuOpen()"
              aria-haspopup="menu"
              aria-label="Switch active shop"
              (click)="onToggleShopMenu()"
            >
              <span>{{ activeShopCaption }}</span>
              <i class="pi pi-chevron-down text-xs" aria-hidden="true"></i>
            </button>
          </div>

          <div class="shop-menu" *ngIf="isShopMenuOpen()" role="menu" aria-label="Available shops">
            <button
              type="button"
              role="menuitem"
              *ngFor="let shop of shops()"
              class="shop-menu-item"
              [class.is-current]="shop.shopId === activeShopId()"
              (click)="onSelectShop(shop.shopId)"
            >
              {{ getShopDisplayLabel(shop) }}
              <span *ngIf="shop.shopId === activeShopId()">Active</span>
            </button>
          </div>
        </div>
      </div>

      <nav class="hidden items-center gap-2 md:flex">
        <a
          routerLink="/overview"
          routerLinkActive="is-active"
          class="rounded-lg px-4 py-2 text-sm font-medium text-stone-700 transition-colors hover:bg-orange-100/70 hover:text-orange-900"
        >
          Overview
        </a>
        <a
          routerLink="/operations"
          routerLinkActive="is-active"
          class="rounded-lg px-4 py-2 text-sm font-medium text-stone-700 transition-colors hover:bg-orange-100/70 hover:text-orange-900"
        >
          Operations
        </a>
      </nav>

      <div class="relative flex items-center gap-2" #profileMenuRoot>
        <p-tag severity="success" value="PWA Ready"></p-tag>
        <p-tag severity="info" value="SSR + Hydration"></p-tag>

        <button
          type="button"
          class="profile-avatar"
          aria-label="Open profile menu"
          (click)="onToggleProfileMenu()"
        >
          {{ profileInitials() }}
        </button>

        <div class="profile-menu" *ngIf="isProfileMenuOpen()" role="menu" aria-label="Profile actions">
          <button type="button" role="menuitem" (click)="onOpenUpdateProfile()">Update Profile</button>
          <button type="button" role="menuitem" (click)="onOpenChangePassword()">Change Password</button>
          <button type="button" role="menuitem" (click)="onOpenAddShop()">Add Shop</button>
          <button type="button" role="menuitem" *ngIf="shouldShowManageShopAction()" (click)="onOpenManageShop()">Manage Shop</button>
        </div>

        <button
          pButton
          type="button"
          icon="pi pi-sign-out"
          label="Logout"
          severity="secondary"
          [outlined]="true"
          [loading]="isSigningOut()"
          [disabled]="isSigningOut()"
          (click)="onSignOut()"
        ></button>
      </div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <router-outlet></router-outlet>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-30 border-t border-orange-200 bg-orange-50/90 px-3 py-2 md:hidden">
    <div class="grid grid-cols-2 gap-2">
      <a
        routerLink="/overview"
        routerLinkActive="is-active"
        class="rounded-lg px-4 py-2 text-center text-sm font-medium text-stone-700"
      >
        Overview
      </a>
      <a
        routerLink="/operations"
        routerLinkActive="is-active"
        class="rounded-lg px-4 py-2 text-center text-sm font-medium text-stone-700"
      >
        Operations
      </a>
    </div>
  </nav>

  <app-create-shop-overlay
    *ngIf="showCreateShopOverlay()"
    (closeRequested)="onCreateShopOverlayClose()"
  ></app-create-shop-overlay>

  <app-manage-shop-overlay
    *ngIf="showManageShopOverlay()"
    [shops]="shops()"
    (closeRequested)="onManageShopOverlayClose()"
  ></app-manage-shop-overlay>

  <app-update-profile-overlay
    *ngIf="showUpdateProfileOverlay() && session()?.user"
    [user]="session()!.user"
    (closeRequested)="onProfileOverlayClose()"
  ></app-update-profile-overlay>

  <app-change-password-overlay
    *ngIf="showChangePasswordOverlay()"
    (closeRequested)="onProfileOverlayClose()"
  ></app-change-password-overlay>

</div>
