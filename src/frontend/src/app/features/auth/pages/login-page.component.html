<section class="login-shell min-h-screen p-0">
  <!-- Page-level bubble decorations -->
  <div class="pg-bubble pg-b1"></div>
  <div class="pg-bubble pg-b2"></div>
  <div class="pg-bubble pg-ring pg-b3"></div>
  <div class="pg-bubble pg-ring pg-b4"></div>
  <div class="pg-bubble pg-ring pg-b5"></div>
  <div class="pg-bubble pg-b6"></div>

  <div class="auth-stage w-full h-screen">
    <article class="auth-card mx-auto w-full max-w-[26rem] rounded-[1.7rem] shadow-2xl shadow-orange-950/20">
      <header class="auth-header">
        <h2>Login Now</h2>
      </header>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form space-y-4 p-6 pt-6" [class.form-busy]="isHttpLoading()">
        <div class="field-wrap space-y-1.5">
          <label for="email">Email Address</label>
          <input
            id="email"
            type="email"
            pInputText
            formControlName="email"
            autocomplete="email"
            class="w-full"
            placeholder="Email or Username"
            [class.ng-invalid]="form.controls.email.invalid && form.controls.email.touched"
          />
          <p class="field-error" *ngIf="form.controls.email.invalid && form.controls.email.touched">Enter a valid email address.</p>
        </div>

        <div class="field-wrap space-y-1.5">
          <label for="password">Password</label>
          <p-password
            inputId="password"
            formControlName="password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
            autocomplete="current-password"
            placeholder="Password"
          ></p-password>
          <p class="field-error" *ngIf="form.controls.password.invalid && form.controls.password.touched">Password is required.</p>
        </div>

        <p *ngIf="serverError()" class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">
          {{ serverError() }}
        </p>

        <button
          pButton
          type="submit"
          [label]="isHttpLoading() ? 'Signing in...' : 'LOGIN'"
          [disabled]="form.invalid || isHttpLoading()"
          class="auth-submit w-full"
        ></button>

        <p class="social-title">Or login with</p>

        <div class="social-actions">
          <button type="button" class="social-button">
            <span class="social-icon social-icon-fb">f</span>
            <span>Facebook</span>
          </button>
          <button type="button" class="social-button">
            <span class="social-icon social-icon-google">G</span>
            <span>Google</span>
          </button>
        </div>

        <p class="signup-hint">Not a member? <a routerLink="/register">Signup now</a></p>
      </form>

      <div class="form-overlay" *ngIf="isHttpLoading()">
        <p-progressSpinner strokeWidth="4" styleClass="auth-spinner"></p-progressSpinner>
      </div>
    </article>

    <aside class="visual-panel" aria-hidden="true">
      <div class="v-disc v-disc-one"></div>
      <div class="v-disc v-disc-two"></div>
      <div class="v-disc v-disc-three"></div>
    </aside>
  </div>
</section>
