<section class="profile-overlay" aria-modal="true" role="dialog">
  <div class="overlay-backdrop"></div>

  <article class="overlay-card" [class.card-busy]="isSubmitting()">
    <header class="overlay-header">
      <button
        pButton
        type="button"
        icon="pi pi-times"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        class="overlay-close"
        [disabled]="isSubmitting()"
        aria-label="Close change password"
        (click)="onClose()"
      ></button>

      <p class="overlay-kicker">Security</p>
      <h2>Change Password</h2>
      <p>Use a strong password with at least 8 characters.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="overlay-form space-y-4">
      <div class="field-wrap space-y-1.5">
        <label for="current-password">Current Password</label>
        <p-password
          inputId="current-password"
          formControlName="currentPassword"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        ></p-password>
      </div>

      <div class="field-wrap space-y-1.5">
        <label for="new-password">New Password</label>
        <p-password
          inputId="new-password"
          formControlName="newPassword"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        ></p-password>
      </div>

      <p *ngIf="serverError()" class="server-error">{{ serverError() }}</p>

      <button
        pButton
        type="submit"
        [label]="isSubmitting() ? 'Changing...' : 'Change Password'"
        [loading]="isSubmitting()"
        [disabled]="form.invalid || isSubmitting()"
        class="submit-button w-full"
      ></button>
    </form>

    <div class="submit-overlay" *ngIf="isSubmitting()">
      <p-progressSpinner strokeWidth="4" styleClass="overlay-spinner"></p-progressSpinner>
    </div>
  </article>
</section>
