<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 290" fill="none">
  <defs>
    <radialGradient id="g-leaf-l" cx="30%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#6ecba8"/>
      <stop offset="55%" stop-color="#2c9170"/>
      <stop offset="100%" stop-color="#1a6b50"/>
    </radialGradient>
    <radialGradient id="g-leaf-r" cx="68%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#5bbf98"/>
      <stop offset="55%" stop-color="#228060"/>
      <stop offset="100%" stop-color="#135e45"/>
    </radialGradient>
    <radialGradient id="g-tulip-l" cx="28%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#ffd8e6"/>
      <stop offset="50%" stop-color="#f882b0"/>
      <stop offset="100%" stop-color="#dd4f8a"/>
    </radialGradient>
    <radialGradient id="g-tulip-r" cx="72%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#fcc0d6"/>
      <stop offset="50%" stop-color="#e96ca0"/>
      <stop offset="100%" stop-color="#cc4080"/>
    </radialGradient>
    <radialGradient id="g-tulip-c" cx="40%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#ffe8f2"/>
      <stop offset="60%" stop-color="#f8a8c8"/>
      <stop offset="100%" stop-color="#e070a8"/>
    </radialGradient>
    <radialGradient id="g-base" cx="50%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#fde8f0"/>
      <stop offset="100%" stop-color="#f4a0bc"/>
    </radialGradient>
    <radialGradient id="g-rock" cx="38%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#7a4e98"/>
      <stop offset="100%" stop-color="#3a1e55"/>
    </radialGradient>
    <radialGradient id="g-ball" cx="28%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#ffe97a"/>
      <stop offset="100%" stop-color="#e89820"/>
    </radialGradient>
    <radialGradient id="g-daisy-c" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe060"/>
      <stop offset="100%" stop-color="#f0a820"/>
    </radialGradient>
    <radialGradient id="g-pinkfl" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffdcee"/>
      <stop offset="100%" stop-color="#f888be"/>
    </radialGradient>
    <filter id="shdw" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(20,5,55,0.35)"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="210" cy="274" rx="155" ry="14" fill="rgba(15,5,45,0.22)"/>

  <!-- Base pink platform -->
  <ellipse cx="210" cy="262" rx="148" ry="20" fill="url(#g-base)"/>

  <!-- Left dark rock -->
  <ellipse cx="138" cy="249" rx="42" ry="24" fill="url(#g-rock)" filter="url(#shdw)"/>
  <ellipse cx="135" cy="240" rx="26" ry="14" fill="rgba(120,80,150,0.35)"/>

  <!-- Right dark rock -->
  <ellipse cx="278" cy="246" rx="46" ry="22" fill="url(#g-rock)" filter="url(#shdw)"/>
  <ellipse cx="280" cy="237" rx="32" ry="13" fill="rgba(120,80,150,0.35)"/>

  <!-- Left arching ball-stem -->
  <path d="M172 252 C152 224 124 208 94 178" stroke="#44aa74" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="91" cy="175" r="14" fill="url(#g-ball)" filter="url(#shdw)"/>
  <circle cx="87" cy="170" r="5" fill="rgba(255,255,200,0.7)"/>

  <!-- Right arching ball-stem -->
  <path d="M248 252 C268 224 296 208 326 175" stroke="#44aa74" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="329" cy="172" r="14" fill="url(#g-ball)" filter="url(#shdw)"/>
  <circle cx="325" cy="167" r="5" fill="rgba(255,255,200,0.7)"/>

  <!-- Small side platform blobs -->
  <ellipse cx="162" cy="258" rx="30" ry="11" fill="#f8c0d5"/>
  <ellipse cx="255" cy="256" rx="24" ry="10" fill="#f2b5cc"/>

  <!-- Back left leaf -->
  <path d="M206 258 C194 224 155 155 172 68 C190 138 207 204 210 252 Z" fill="url(#g-leaf-l)"/>
  <path d="M205 250 C196 224 163 164 176 90 C188 150 204 208 208 248 Z" fill="rgba(160,240,200,0.22)"/>

  <!-- Back right leaf -->
  <path d="M214 258 C226 224 264 152 246 65 C228 138 213 204 210 252 Z" fill="url(#g-leaf-r)"/>

  <!-- Tulip stem -->
  <rect x="207" y="158" width="6" height="102" rx="3" fill="#3da868"/>

  <!-- Stem side leaf left -->
  <path d="M210 208 C196 200 184 186 188 168 C198 183 205 196 210 204 Z" fill="#3da868"/>
  <!-- Stem side leaf right -->
  <path d="M210 208 C224 200 236 186 232 168 C222 183 215 196 210 204 Z" fill="#2e9060"/>

  <!-- Tulip outer left petal -->
  <path d="M210 162 C190 170 182 202 184 226 C189 244 204 255 210 256 C210 228 210 192 210 162 Z" fill="url(#g-tulip-l)"/>
  <!-- Tulip outer right petal -->
  <path d="M210 162 C230 170 238 202 236 226 C231 244 216 255 210 256 C210 228 210 192 210 162 Z" fill="url(#g-tulip-r)"/>
  <!-- Tulip inner center petal -->
  <path d="M210 162 C200 174 198 205 201 228 C205 244 208 254 210 256 C210 228 210 194 210 162 Z" fill="url(#g-tulip-c)"/>
  <!-- Tulip tip -->
  <ellipse cx="210" cy="158" rx="12" ry="8" fill="#ffe4ef" transform="rotate(-6 210 158)"/>
  <ellipse cx="210" cy="157" rx="6" ry="4" fill="rgba(255,255,255,0.5)"/>

  <!-- Daisy stem -->
  <line x1="298" y1="220" x2="295" y2="165" stroke="#3da868" stroke-width="3" stroke-linecap="round"/>
  <!-- Daisy petals -->
  <g transform="translate(295,155)">
    <ellipse rx="5" ry="10" fill="#fff4f8"/>
    <ellipse rx="5" ry="10" fill="#fff4f8" transform="rotate(40)"/>
    <ellipse rx="5" ry="10" fill="#ffedf5" transform="rotate(80)"/>
    <ellipse rx="5" ry="10" fill="#fff4f8" transform="rotate(120)"/>
    <ellipse rx="5" ry="10" fill="#fff4f8" transform="rotate(160)"/>
    <ellipse rx="5" ry="10" fill="#ffedf5" transform="rotate(200)"/>
    <ellipse rx="5" ry="10" fill="#fff4f8" transform="rotate(240)"/>
    <ellipse rx="5" ry="10" fill="#fff4f8" transform="rotate(280)"/>
    <ellipse rx="5" ry="10" fill="#ffedf5" transform="rotate(320)"/>
    <circle r="9" fill="url(#g-daisy-c)"/>
    <circle r="4.5" fill="#f8a818"/>
  </g>

  <!-- Pink 4-petal flower stem -->
  <line x1="338" y1="215" x2="336" y2="186" stroke="#3da868" stroke-width="3" stroke-linecap="round"/>
  <!-- Pink 4-petal flower -->
  <g transform="translate(336,178)">
    <ellipse rx="7.5" ry="13" fill="url(#g-pinkfl)"/>
    <ellipse rx="7.5" ry="13" fill="url(#g-pinkfl)" transform="rotate(90)"/>
    <circle r="6" fill="#fce2f0"/>
    <circle r="3" fill="#ffcce5"/>
  </g>

  <!-- Yellow asterisk flower on left, on stem -->
  <line x1="112" y1="230" x2="115" y2="205" stroke="#3da868" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(115,197)">
    <ellipse rx="4" ry="8" fill="#ffdc4e"/>
    <ellipse rx="4" ry="8" fill="#ffd040" transform="rotate(60)"/>
    <ellipse rx="4" ry="8" fill="#ffca30" transform="rotate(120)"/>
    <ellipse rx="4" ry="8" fill="#ffdc4e" transform="rotate(180)"/>
    <ellipse rx="4" ry="8" fill="#ffd040" transform="rotate(240)"/>
    <ellipse rx="4" ry="8" fill="#ffca30" transform="rotate(300)"/>
    <circle r="4.5" fill="#f8a818"/>
  </g>

  <!-- Accent petal cluster near tulip base -->
  <circle cx="184" cy="185" r="5" fill="#ffb8d0"/>
  <circle cx="178" cy="176" r="3.5" fill="#f898c0"/>
  <circle cx="237" cy="182" r="4.5" fill="#ffb8d0"/>
</svg>
